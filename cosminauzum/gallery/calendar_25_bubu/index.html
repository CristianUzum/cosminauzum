    <title>Calendar</title>
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto+Condensed:300,300i,400,400i,700i"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }

      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #fbfbef;
        z-index: 1000;
      }

      #ladyB {
        width: 120px;
        height: 120px;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      body.loaded #loader {
        opacity: 0;
        visibility: hidden;
        transition: opacity 1s ease, visibility 1s ease;
      }

      body.loaded #ladyB {
        position: absolute;
        margin: auto;
        width: 50px;
        height: 50px;
        animation: none;
      }
      body {
        font-family: "Roboto Condensed", sans-serif;
        /* background-image: url("bubu.png"); */
        background-image: linear-gradient(
          to right top,
          #d16ba5,
          #f17b94,
          #ff9384,
          #ffb17c,
          #ffd180,
          #f0e187,
          #dff096,
          #ccfeac,
          #b0ffbb,
          #94ffcc,
          #79fedf,
          #5ffbf1
        );
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: #333;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #marikita {
        position: absolute;
        margin: auto;
        z-index: 99999;
      }

      h1,
      h5,
      h6 {
        color: #f4f2ee;
        font-weight: bolder;
        text-shadow: 1px 1px 1px #000;
      }
      h2 {
        color: #b0ffbb;
        text-shadow: 1px 1px 1px #000;
      }
      .calendar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        padding: 20px;
      }
      .month {
        border: 1px solid #ccc;
        padding: 10px;
        border-radius: 10px;
        background-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .month h3 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 1.5rem;
        color: #444;
      }
      .days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
      }
      .day,
      .number {
        text-align: center;
        padding: 10px;
        border: 1px solid #eee;
        cursor: pointer;
      }
      .day {
        font-weight: bold;
        background-color: #f8f9fa;
      }
      .number.empty {
        visibility: hidden;
      }
      .number.holiday {
        background-color: #ffcccc !important;
        z-index: 3;
      }
      .number.divers {
        background-color: #f17070;
      }
      .number.birthday {
        background-color: #ccffcc !important;
        z-index: 2;
      }
      .number.vacation {
        background-color: #ccccff;
      }
      .number.today {
        background-color: #ffeb3b !important;
        font-weight: bold;
        z-index: 1;
      }
      .month-image {
        width: 100%;
        height: 150px;
        object-fit: contain;
        border-radius: 10px 10px 0 0;
      }
      .back-button {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .back-button:hover {
        background-color: #0056b3;
      }
      .event-item {
        margin-bottom: 10px;
        color: #792a57;
        background-color: #ca84ac83;
        padding: 15px;
      }
      .add-event-form {
        margin-top: 10px;
      }

      .copyright a {
        color: #ffd700; /* Auriu */
        font-weight: bold; /* Corectat "bolum si nu fixat d" */
        text-decoration: none;
        transition: color 0.3s ease-in-out;
      }

      .copyright a:hover {
        color: #ff4500; /* Portocaliu intens */
        text-decoration: underline;
      }
      footer {
        position: relative;
        text-align: center;
        padding: 10px;
        background-color: #28a745; /* Verde mai intens */
        border-top: 1px solid #2c6643;
        box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.2);
      }
    </style>

    <!-- Modal pentru evenimente și sărbători -->
    <div
      class="modal fade"
      id="eventModal"
      tabindex="-1"
      aria-labelledby="eventModalLabel"

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script>
      $(document).ready(function () {
        // Simulează încărcarea
        setTimeout(function () {
          $("body").addClass("loaded");

          // Ascunde loader-ul și activează urmărirea mouse-ului
          $("#loader").hide(); // Ascunde loader-ul complet
        }, 3000); // 3 secunde de loader
      });
      // Funcție pentru scroll personalizat
      function smoothScrollTo(target) {
        const targetElement = document.querySelector(target);
        if (targetElement) {
          const offset =
            targetElement.getBoundingClientRect().top + window.scrollY;
          const duration = 800; // Durata animației în milisecunde
          const start = window.scrollY;
          const distance = offset - start;
          let startTime = null;

          function animation(currentTime) {
            if (startTime === null) startTime = currentTime;
            const timeElapsed = currentTime - startTime;
            const run = easeInOutQuad(timeElapsed, start, distance, duration);
            window.scrollTo(0, run);
            if (timeElapsed < duration) requestAnimationFrame(animation);
          }

          // Funcție de easing pentru o animație mai plăcută
          function easeInOutQuad(t, b, c, d) {
            t /= d / 2;
            if (t < 1) return (c / 2) * t * t + b;
            t--;
            return (-c / 2) * (t * (t - 2) - 1) + b;
          }

          requestAnimationFrame(animation);
        }
      }

      // Exemplu de utilizare:
      document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
        anchor.addEventListener("click", function (e) {
          e.preventDefault();
          const target = this.getAttribute("href");
          smoothScrollTo(target);
        });
      });
    </script>
    <script>
      $(document).ready(function () {
        $(document).mousemove(girarMarikita);
      });
      function girarMarikita(e) {
        var box = $("#marikita");
        var boxCenter = [
          box.offset().left + box.width() / 2,
          box.offset().top + box.height() / 2,
        ];
        var angle =
          Math.atan2(e.pageX - boxCenter[0], -(e.pageY - boxCenter[1])) *
          (180 / Math.PI);

        box.css({
          "-webkit-transform": "rotate(" + angle + "deg)",
          "-moz-transform": "rotate(" + angle + "deg)",
          transform: "rotate(" + angle + "deg)",
        });
        moverMarikita(e);
      }

      function moverMarikita(e) {
        var $mouseX = e.pageX;
        var $mouseY = e.pageY;
        $("#marikita")
          .stop()
          .animate({ left: $mouseX + "px", top: $mouseY + "px" }, 700);
      }
    </script>
    <script>
      // Funcție pentru a genera toate datele dintr-un interval
      function generateDateRange(startDate, endDate) {
        const dates = [];
        let currentDate = new Date(startDate);

        while (currentDate <= new Date(endDate)) {
          dates.push(formatDate(currentDate)); // Formatează data și o adaugă în array
          currentDate.setDate(currentDate.getDate() + 1); // Trecem la următoarea zi
        }

        return dates;
      }

      // Sărbători și vacanțe în România pentru 2025
      const holidays = {
        "01-01": "Anul Nou",
        "01-02": "Anul Nou",
        "01-06": "Boboteaza",
        "01-07": "Sfântul Ioan Botezătorul",
        "01-24": "Ziua Unirii Principatelor Române",
        "04-18": "Paște ortodox (Vinerea Mare)",
        "04-20": "Paște ortodox",
        "04-21": "A doua zi de Paște ortodox",
        "05-01": "Ziua Muncii",
        "06-01": "Ziua Copilului",
        "06-05": "Ziua Învăţătorului",
        "06-08": "Rusalii",
        "06-09": "A doua zi de Rusalii",
        "08-15": "Adormirea Maicii Domnului",
        "11-30": "Sfântul Andrei",
        "12-01": "Ziua Națională a României",
        "12-25": "Crăciunul",
        "12-26": "Crăciunul",
      };

      const diverse = {
        "04-14": "începutul Saptămânii verzi",
        "04-29": "Comper Română Etapa 2",
        "05-06": "Comper Matematică Etapa 2",
        "06-03": "Comper Română Etapa Naţională",
        "06-10": "Comper Matematică Etapa Naţională",
      };

      // Zile de naștere
      const birthdays = [
        { date: "01-19", name: "Ziua de naștere - Frau Yvonne" },
        { date: "01-19", name: "Ziua de naștere - Daria" },
        { date: "02-22", name: "Ziua de naștere - Karina" },
        { date: "02-25", name: "Ziua de naștere - Lara" },
        { date: "03-09", name: "Ziua de naștere - Maya" },
        { date: "04-25", name: "Ziua de naștere - Sara" },
        { date: "05-12", name: "Ziua de naștere - Mihai" },
        { date: "06-11", name: "Ziua de naștere - Ema" },
        { date: "08-09", name: "Ziua de naștere - David R." },
        { date: "08-14", name: "Ziua de naștere - Ionela" },
        { date: "08-27", name: "Ziua de naștere - Maria" },
        { date: "09-18", name: "Ziua de naștere - Ana" },
        { date: "09-26", name: "Ziua de naștere - David G." },
        { date: "12-04", name: "Ziua de naștere - Nicol" },
      ];

      // Vacanțe
      const vacations = {
        ...generateDateRange("02-08-2025", "02-16-2025").reduce((acc, date) => {
          acc[date.slice(5)] = "Vacanță"; // Folosim doar lună-zi pentru a repeta anual
          return acc;
        }, {}),
        ...generateDateRange("04-18-2025", "04-25-2025").reduce((acc, date) => {
          acc[date.slice(5)] = "Vacanța de primavara";
          return acc;
        }, {}),
        ...generateDateRange("06-23-2025", "09-07-2025").reduce((acc, date) => {
          acc[date.slice(5)] = "Vacanță";
          return acc;
        }, {}),
      };

      // Funcție pentru a formata data ca "YYYY-MM-DD"
      function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      // Funcție pentru a obține sărbătorile pentru un an specific
      function getHolidaysForYear(year) {
        const result = {};
        for (const [key, value] of Object.entries(holidays)) {
          result[`${year}-${key}`] = value;
        }
        return result;
      }

      // Funcție pentru a obține zilele de naștere pentru un an specific
      function getBirthdaysForYear(year) {
        return birthdays.map((b) => ({
          date: `${year}-${b.date}`,
          name: b.name,
        }));
      }

      // Funcție pentru a obține vacanțele pentru un an specific
      function getVacationsForYear(year) {
        const result = {};
        for (const [key, value] of Object.entries(vacations)) {
          result[`${year}-${key}`] = value;
        }
        return result;
      }

      // Funcție pentru a genera calendarul pentru un an specific
      function generateCalendar(year) {
        const calendar = document.getElementById("calendar");
        calendar.innerHTML = "";

        const months = [
          "Ianuarie",
          "Februarie",
          "Martie",
          "Aprilie",
          "Mai",
          "Iunie",
          "Iulie",
          "August",
          "Septembrie",
          "Octombrie",
          "Noiembrie",
          "Decembrie",
        ];
        const images = [
          "ian.jpg",
          "feb.jpg",
          "martie.jpg",
          "april.jpg",
          "mai.jpg",
          "iun.jpg",
          "iul.jpg",
          "aug.jpg",
          "sept.jpg",
          "oct.jpg",
          "noi.jpg",
          "dec.jpg",
        ];

        const holidaysForYear = getHolidaysForYear(year);
        const birthdaysForYear = getBirthdaysForYear(year);
        const vacationsForYear = getVacationsForYear(year);

        months.forEach((month, index) => {
          const monthDiv = document.createElement("div");
          monthDiv.className = "month";
          monthDiv.innerHTML = `
      <h3>${month} ${year}</h3>
      <img src="${images[index]}" class="month-image" alt="${month}">
      <div class="days"></div>
    `;
          const daysDiv = monthDiv.querySelector(".days");

          // Adaugă zilele săptămânii
          ["L", "M", "M", "J", "V", "S", "D"].forEach((day) => {
            const dayDiv = document.createElement("div");
            dayDiv.className = "day";
            dayDiv.textContent = day;
            daysDiv.appendChild(dayDiv);
          });

          // Adaugă zilele lunii
          const firstDay = new Date(year, index, 1).getDay();
          const daysInMonth = new Date(year, index + 1, 0).getDate();

          for (let i = 1; i < firstDay; i++) {
            const emptyDiv = document.createElement("div");
            emptyDiv.className = "number empty";
            daysDiv.appendChild(emptyDiv);
          }

          for (let i = 1; i <= daysInMonth; i++) {
            const date = new Date(year, index, i);
            const formattedDate = formatDate(date);
            const monthDay = formattedDate.slice(5); // Extrage "MM-DD" din "YYYY-MM-DD"
            const numberDiv = document.createElement("div");
            numberDiv.className = "number";
            numberDiv.textContent = i;

            // Verifică dacă este sărbătoare
            if (holidays[monthDay]) {
              numberDiv.classList.add("holiday");
            }

            // Verifică dacă este eveniment divers
            if (diverse[monthDay]) {
              numberDiv.classList.add("divers");
            }

            // Verifică dacă este zi de naștere
            const birthdayEvents = birthdaysForYear.filter(
              (b) => b.date === formattedDate
            );
            if (birthdayEvents.length > 0) {
              numberDiv.classList.add("birthday");
            }

            // Verifică dacă este vacanță
            if (vacations[monthDay]) {
              numberDiv.classList.add("vacation");
            }

            // Verifică dacă există evenimente personalizate
            const events =
              JSON.parse(localStorage.getItem("calendarEvents")) || {};
            if (events[formattedDate]) {
              numberDiv.classList.add("event");
            }

            // Verifică dacă este ziua curentă
            const today = formatDate(new Date());
            if (formattedDate === today) {
              numberDiv.classList.add("today");
            }

            // Deschide modalul la click
            numberDiv.addEventListener("click", () => openModal(formattedDate));
            daysDiv.appendChild(numberDiv);
          }

          calendar.appendChild(monthDiv);
        });

        // Scroll automat la luna curentă
        const currentMonthIndex = new Date().getMonth(); // Indexul lunii curente (0-11)
        const currentMonthElement = document.getElementById(
          `month-${currentMonthIndex}`
        );
        if (currentMonthElement) {
          currentMonthElement.scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        }
      }

      // Funcție pentru a genera un ID unic
      function generateId() {
        return "event-" + Date.now();
      }

      // Încarcă evenimentele din localStorage
      function loadEvents() {
        return JSON.parse(localStorage.getItem("calendarEvents")) || {};
      }

      // Salvează evenimentele în localStorage
      function saveEvents(events) {
        localStorage.setItem("calendarEvents", JSON.stringify(events));
      }

      // Adaugă un eveniment
      function addEvent(date, text, type) {
        const events = loadEvents();
        const id = generateId();
        if (!events[date]) events[date] = [];
        events[date].push({ id, text, type });
        saveEvents(events);
        return id;
      }

      // Șterge un eveniment
      function deleteEvent(id) {
        const events = loadEvents();
        for (const date in events) {
          events[date] = events[date].filter((event) => event.id !== id);
        }
        saveEvents(events);
        const currentDate = $("#eventModal").data("currentDate");
        if (currentDate) openModal(currentDate); // Reîncarcă evenimentele în modal
      }

      // Editează un eveniment
      function editEvent(id, newText, newType) {
        const events = loadEvents();
        for (const date in events) {
          const eventIndex = events[date].findIndex((event) => event.id === id);
          if (eventIndex !== -1) {
            events[date][eventIndex].text = newText;
            events[date][eventIndex].type = newType;
            break;
          }
        }
        saveEvents(events);
        const currentDate = $("#eventModal").data("currentDate");
        if (currentDate) openModal(currentDate); // Reîncarcă evenimentele în modal
      }

      // Prompt pentru editarea unui eveniment
      function editEventPrompt(id) {
        const events = loadEvents();
        for (const date in events) {
          const event = events[date].find((e) => e.id === id);
          if (event) {
            const newText = prompt("Editează evenimentul:", event.text);
            const newType = prompt("Editează tipul evenimentului:", event.type);
            if (newText !== null && newType !== null) {
              editEvent(id, newText, newType);
            }
            break;
          }
        }
      }

      function openModal(date) {
        const eventList = document.getElementById("eventList");
        const holidayInfo = document.getElementById("holidayInfo");
        const diversInfo = document.getElementById("diversInfo");

        // Afișează data curentă în modal
        $("#eventModalLabel").text(`Evenimente și sărbători - ${date}`);

        // Afișează evenimentele existente
        const events = loadEvents();
        eventList.innerHTML = events[date]
          ? events[date]
              .map(
                (event) => `
    <div class="event-item">
        <strong>${event.type}:</strong> ${event.text}
        <button onclick="editEventPrompt('${event.id}')" class="btn btn-sm btn-warning">Editează</button>
        <button onclick="deleteEvent('${event.id}')" class="btn btn-sm btn-danger">Șterge</button>
    </div>
  `
              )
              .join("")
          : "";

        // Afișează informații despre sărbători, zile de naștere și evenimente diverse
        let info = "";
        const monthDay = date.slice(5); // Extrage "MM-DD" din "YYYY-MM-DD"

        // Verifică dacă este sărbătoare
        if (holidays[monthDay]) {
          info += `<div class="alert alert-info">${holidays[monthDay]}</div>`;
        }

        // Verifică dacă este eveniment divers
        if (diverse[monthDay]) {
          info += `<div class="alert alert-info">${diverse[monthDay]}</div>`;
        }

        // Verifică dacă este zi de naștere
        const birthdayEvents = birthdays.filter((b) => b.date === monthDay);
        if (birthdayEvents.length > 0) {
          info += birthdayEvents
            .map((b) => `<div class="alert alert-success">${b.name}</div>`)
            .join("");
        }

        // Verifică dacă este vacanță
        if (vacations[monthDay]) {
          info += `<div class="alert alert-warning">${vacations[monthDay]}</div>`;
        }

        holidayInfo.innerHTML = info;

        // Formular pentru adăugarea de evenimente
        const eventForm = document.getElementById("eventForm");
        eventForm.onsubmit = (e) => {
          e.preventDefault();
          const eventInput = document.getElementById("eventInput");
          const eventType = document.getElementById("eventType").value;
          if (eventInput.value) {
            addEvent(date, eventInput.value, eventType);
            eventInput.value = "";
            openModal(date); // Reîncarcă evenimentele în modal
          }
        };

        $("#eventModal").data("currentDate", date);
        $("#eventModal").modal("show");
      }

      // La încărcarea paginii, generează calendarul pentru anul curent
      $(document).ready(function () {
        // Populează selectorul de ani
        const yearSelect = document.getElementById("yearSelect");
        for (let year = 2025; year <= 2030; year++) {
          const option = document.createElement("option");
          option.value = year;
          option.textContent = year;
          yearSelect.appendChild(option);
        }

        // Generează calendarul pentru anul selectat
        yearSelect.addEventListener("change", () => {
          generateCalendar(parseInt(yearSelect.value));
        });

        // Generează calendarul pentru anul curent
        generateCalendar(2025);
      });
    </script>
