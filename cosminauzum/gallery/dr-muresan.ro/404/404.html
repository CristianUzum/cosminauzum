<!DOCTYPE html>
<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>404 Pagina nu există - Artvision Med</title>
      <style>
          @import url('https://fonts.googleapis.com/css2?family=Vesper+Libre:wght@700&display=swap');
*{
  margin: 0;
  padding: 0;
  outline: none;
  box-sizing: border-box;
  font-family: "Vesper Libre", sans-serif;
}
:root {
  --lightyellow: #ebdd6d;
  --yellow:#fdc628;
  --white: #fff;
  --black: rgba(0, 0, 0, 0.7);
  --black2: #333;
  --lightgreen:#c6ebd7;
  --green:#047a7f;
}
body{
  height: 100vh;
  background: -webkit-repeating-linear-gradient(-45deg, var(--green), var(--lightgreen),var(--lightyellow),var(--yellow));
  background-size: 400%;
}
#error-page{
  position: absolute;
  top: 10%;
  left: 15%;
  right: 15%;
  bottom: 10%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  box-shadow: 0px 5px 10px rgba(0,0,0,0.1);
}
#error-page .content{
  max-width: 600px;
  text-align: center;
}
.content h2.header{
  font-size: 18vw;
  line-height: 1em;
  position: relative;
  text-shadow: 1px 1px 1px var(--green);
}
.content h2.header:after{
  position: absolute;
  content: attr(data-text);
  top: 0;
  left: 0;
  right: 0;
  background: -webkit-repeating-linear-gradient(-45deg, var(--green), var(--lightgreen),var(--lightyellow),var(--yellow));
  background-size: 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.25);
  animation: animate 10s ease-in-out infinite;
}
@keyframes animate {
  0%{
    background-position: 0 0;
  }
  25%{
    background-position: 100% 0;
  }
  50%{
    background-position: 100% 100%;
  }
  75%{
    background-position: 0% 100%;
  }
  100%{
    background-position: 0% 0%;
  }
}
.content h4{
  font-size: 1.5em;
  margin-bottom: 20px;
  text-transform: uppercase;
  color: #000;
  font-size: 2em;
  max-width: 600px;
  position: relative;
}
.content h4:after{
  position: absolute;
  content: attr(data-text);
  top: 0;
  left: 0;
  right: 0;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.content p{
  font-size: 1.2em;
  color: #0d0d0d;
}
.content .btns{
  margin: 25px 0;
  display: inline-flex;
}
.content .btns a{
  display: inline-block;
  margin: 0 10px;
  text-decoration: none;
  border: 2px solid var(--green);
  color: var(--green);
  font-weight: 500;
  padding: 10px 25px;
  border-radius: 25px;
  text-transform: uppercase;
  transition: all 0.3s ease;
}
.content .btns a:hover{
  background: var(--green);
  color: #fff;
}
      </style>
   </head>
   <body>
      <div id="error-page">
         <div class="content">
            <h2 class="header" data-text="404">
               404
            </h2>
            <h4 data-text="Opps! Page not found">
               Opps! Pagina nu există
            </h4>
            <p>
               Ne pare rău, pagina pe care o căutați nu există. Dacă credeți că ceva nu funcţionează, raportați o problemă.
            </p>
            <div class="btns">
               <a href="https://www.dr-muresan.ro">Pagina principală</a>
               <a href="https://www.dr-muresan.ro/contact/index.html">Raportați problema</a>
            </div>
         </div>
      </div>
   </body>
</html>
