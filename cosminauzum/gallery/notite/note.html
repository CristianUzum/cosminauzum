<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Taking App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }

        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #4CAF50;
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 80px;
        }

        .note-card {
            background-color: white;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            min-height: 150px;
        }

        .note-card:hover {
            transform: translateY(-5px);
        }

        .note-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .note-content {
            color: #666;
            font-size: 1em;
            line-height: 1.4;
            max-height: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .modal-textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="notes-grid" id="notesContainer"></div>
    <button class="add-btn" id="addBtn">+</button>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <input type="text" class="modal-input" id="editTitle" placeholder="Note Title">
            <textarea class="modal-textarea" id="editContent" placeholder="Note Content"></textarea>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('notes')) || [];
        let currentNoteIndex = null;

        function saveNotes() {
            localStorage.setItem('notes', JSON.stringify(notes));
        }

        function renderNotes() {
            const container = document.getElementById('notesContainer');
            container.innerHTML = '';
            
            notes.forEach((note, index) => {
                const noteElement = document.createElement('div');
                noteElement.className = 'note-card';
                noteElement.innerHTML = `
                    <div class="note-title">${note.title || 'Untitled Note'}</div>
                    <div class="note-content">${note.content || ''}</div>
                `;
                
                noteElement.addEventListener('click', () => openNote(index));
                container.appendChild(noteElement);
            });
        }

        function openNote(index) {
            currentNoteIndex = index;
            const note = notes[index];
            document.getElementById('editTitle').value = note.title || '';
            document.getElementById('editContent').value = note.content || '';
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeNote() {
            const title = document.getElementById('editTitle').value;
            const content = document.getElementById('editContent').value;
            
            if (currentNoteIndex !== null) {
                notes[currentNoteIndex] = { title, content };
            }
            
            saveNotes();
            renderNotes();
            document.getElementById('modalOverlay').style.display = 'none';
            currentNoteIndex = null;
        }

        document.getElementById('addBtn').addEventListener('click', () => {
            notes.push({ title: 'New Note', content: 'Start writing...' });
            saveNotes();
            renderNotes();
            openNote(notes.length - 1);
        });

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeNote();
            }
        });

        // Initial render
        renderNotes();
    </script>
</body>
</html>
