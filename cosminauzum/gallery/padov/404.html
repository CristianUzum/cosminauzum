<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
    rel="shortcut icon"
    href="./img/logo.png"
    type="image/png"
  />
    <title>Eroare 404 - Pagina nu există</title>
    <style>
      body {
        background-color: #44261c; /* culoare ciocolatiu */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }

      .error-container {
        background-color: rgba(0, 0, 0, 0.6); /* semi-transparent */
        padding: 20px;
        border-radius: 8px;
        max-width: 90%;
        width: 100%;
        box-sizing: border-box;
      }

      img {
        max-width: 100%;
        height: auto;
        margin-bottom: 20px;
        width: 400px;
        max-height: 400px;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 20px;
      }

      p {
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .back-button {
        background-color: rgb(0, 158, 89);
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
        transition: background-color 0.3s;
      }

      .back-button:hover {
        background-color: #006f46; /* culoare mai închisă la hover */
      }

      /* Media Queries pentru diferite dimensiuni de ecran */
      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        p {
          font-size: 1rem;
        }

        .back-button {
          font-size: 0.9rem;
          padding: 8px 16px;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.5rem;
        }

        p {
          font-size: 0.9rem;
        }

        .back-button {
          font-size: 0.8rem;
          padding: 6px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <img src="./img/404.jpg" alt="404 Image" />
      <h1>404 - Pagina nu există</h1>
      <p>Ne pare rău, dar pagina pe care o cauți nu a fost găsită.</p>
      <button class="back-button" onclick="location.href='./index.html'">
        Înapoi la pagina principală
      </button>
    </div>
  </body>
</html>
