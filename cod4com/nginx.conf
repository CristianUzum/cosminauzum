server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        # Magia se întâmplă aici: dacă fișierul nu există, trimite la index.html
        try_files $uri $uri/ /index.html;
    }

    # Opțional: Cache pentru asset-uri (css/js) pentru a face site-ul mai rapid
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}