                    <p>În jurul secolului al XI-lea (anii 1000 - 1050 e.n.), grupuri mari au părăsit subcontinentul indian în urma conflictelor și invaziilor militare, devenind un popor nomad sau semi-nomad în continuă mișcare.</p>

                        <p className="text-sm text-gray-500 leading-relaxed mb-4">Ghiduri ilustrate pentru elevi și fișe de curs didactice, realizate de profesori specializați în limba romani.</p>
                        <ul className="space-y-3 pt-2 font-medium">
                          {["Manual de Limba Romani - Clasa I", "Fișe de gramatică practică", "Culegere de proverbe indiene și rome"].map((item, i) => (
                            <li key={i} onClick={() => setActiveModal('library')} className="flex items-center justify-between text-xs text-emerald-800 hover:text-amber-700 cursor-pointer p-2 bg-emerald-50/40 rounded-xl leading-relaxed">
                              <span>📂 {item}</span> <i data-lucide="download" className="w-4 h-4"></i>
                            </li>
                          ))}
                        </ul>
                      </div>
                    </div>

                    <div className="bg-emerald-950 p-8 rounded-[2.5rem] text-white space-y-6 shadow-2xl flex flex-col justify-between">
                      <div>
                        <div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center text-emerald-400 mb-6">
                          <i data-lucide="users" className="w-7 h-7"></i>
                        </div>
                        <h3 className="text-2xl font-bold">{t.traditions}</h3>
                        <p className="text-emerald-200/70 text-sm leading-relaxed">Un glosar fascinant al marilor bresle și meșteșuguri: fierari, argintari, lăutari, spoitori și valoarea lor inestimabilă în metalurgia și arta tradițională.</p>
                      </div>
                      <div className="pt-4 border-t border-emerald-900">
                        <button onClick={() => setActiveModal('migration')} className="flex items-center gap-2 font-bold text-emerald-400 hover:text-emerald-300 transition-all text-sm">
                          {t.readMore} <i data-lucide="arrow-right" className="w-4 h-4"></i>
                        </button>
                      </div>
                    </div>
                  </div>
                </section>

                {/* Success Center */}
                <section id="success" className="scroll-mt-32">
                  <SectionHeader title={t.successCenter} subtitle={t.successSubtitle} icon="award" colorClass="bg-amber-600 text-white" />
                  <div className="grid lg:grid-cols-2 gap-12">
                    <div className="space-y-8">
                      <h3 className="text-2xl font-serif font-bold text-amber-950 flex items-center gap-3">
                        <i data-lucide="book-open" className="text-amber-600"></i> {t.personalities}
                      </h3>
                      <div className="grid sm:grid-cols-2 gap-4">
                        {[
                          { name: "Charlie Chaplin", role: "Legendă al Cinematografiei", desc: "Actor, scenarist și regizor cu rădăcini materne rome." },
                          { name: "Grigoraș Dinicu", role: "Compozitor & Violonist", desc: "Geniu al vioarei, celebru pe plan mondial pentru 'Hora Staccato'." },
                          { name: "Alina Șerban", role: "Regizoare & Actriță", desc: "Pionieră a teatrului feminist și producții rome de anvergură europeană." },
                          { name: "Django Reinhardt", role: "Chitarist de Geniu", desc: "Creatorul stilului jazz manouche în anii 1930." }
                        ].map((p, i) => (
                          <div key={i} className="flex flex-col p-5 bg-white rounded-3xl border border-amber-100/50 shadow-sm hover:shadow transition-shadow">
                            <div className="flex items-center gap-3 mb-2">
                              <div className="w-10 h-10 bg-amber-100 rounded-full overflow-hidden shrink-0">
                                <img src={`https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=100&h=100&q=80`} alt={p.name} className="w-full h-full object-cover" />
                              </div>
                              <div>
                                <p className="font-extrabold text-amber-950 text-sm leading-tight">{p.name}</p>
                                <p className="text-[9px] text-amber-600 font-extrabold uppercase tracking-wider">{p.role}</p>
                              </div>
                            </div>
                            <p className="text-xs text-gray-500 leading-relaxed italic">{p.desc}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                    
                    <div className="space-y-8">
                      <h3 className="text-2xl font-serif font-bold text-amber-950 flex items-center gap-3">
                        <i data-lucide="play-circle" className="text-amber-600"></i> {t.stories}
                      </h3>
                      <div className="aspect-video rounded-[2.5rem] overflow-hidden relative group cursor-pointer shadow-2xl border-4 border-white">
                        <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=800&q=80" alt="Success video cover" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                        <div className="absolute inset-0 bg-gradient-to-t from-amber-950/90 via-amber-950/40 to-transparent flex flex-col justify-end p-8">
                          <p className="text-white font-extrabold text-xl font-serif italic mb-1">Video: Tineri care au învins stereotipurile</p>
                          <p className="text-amber-300 text-sm font-semibold">Despre antreprenoriat, limbi clasice și implicare digitală în ONG.</p>
                        </div>
                        <div className="absolute inset-0 flex items-center justify-center bg-black/25 opacity-0 group-hover:opacity-100 transition-all duration-300">
                          <i data-lucide="play-circle" className="w-20 h-20 text-white drop-shadow-2xl"></i>
                        </div>
                      </div>
                    </div>
                  </div>
                </section>

                {/* Opportunities */}
                <section id="opportunities" className="scroll-mt-32">
                  <SectionHeader title={t.opportunities} subtitle={t.opportunitiesSubtitle} icon="briefcase" colorClass="bg-blue-600 text-white" />
                  <div className="grid md:grid-cols-3 gap-8">
                    <Card title={t.admission} desc="Metodologii complete de admitere și pașii legali pentru accesul pe locurile bugetate destinate minorității rome." icon="graduation-cap" colorClass="bg-blue-100 text-blue-850" linkLabel={t.readMore} onClick={() => setActiveModal('admission')} />
                    <Card title={t.jobBoard} desc="Bursa locurilor de muncă active și corelarea cu campanii naționale diversity-friendly." icon="briefcase" colorClass="bg-blue-50 text-indigo-900" linkLabel={t.readMore} onClick={() => alert('Bursa de locuri de muncă este o secțiune activată periodic în colaborare cu AJOFM.')} />
                    <Card title={t.ngos} desc="Harta organizațiilor rome din Banat și asociații partenere de la care puteți adresa solicitări sau asistență locală." icon="users" colorClass="bg-cyan-100 text-cyan-900" linkLabel={t.readMore} onClick={() => alert('Baza de date cu ONG-uri partenere este în curs de sincronizare în județul Caraș-Severin.')} />
                  </div>
                </section>

                {/* Legal */}
                <section id="legal" className="scroll-mt-32 bg-rose-50 rounded-[4rem] p-8 sm:p-20 border border-rose-100">
                  <SectionHeader title={t.legal} subtitle={t.legalSubtitle} icon="shield-check" colorClass="bg-rose-600 text-white" />
                  <div className="grid lg:grid-cols-2 gap-12">
                    <div className="bg-white p-10 rounded-[3rem] border border-rose-100 shadow-sm space-y-6 flex flex-col justify-between">
                      <div>
                        <h3 className="text-2xl font-serif font-bold text-rose-950 mb-3">{t.antiDiscrimination}</h3>
                        <p className="text-gray-600 leading-relaxed">
                          Ce reprezintă discriminarea bazată pe criterii etnice (antigipsism/anti-romi) și cum îți poți exercita legitim apărarea drepturilor cu asistență juridică gratuită.
                        </p>
                      </div>
                      <button onClick={() => setActiveModal('slavery')} className="flex items-center gap-2 font-bold text-rose-600 hover:text-rose-800 transition-all font-serif italic text-lg text-left mt-6">
                        {t.readMore} <i data-lucide="arrow-right" className="w-4 h-4"></i>
                      </button>
                    </div>

                    <div className="bg-rose-950 p-10 rounded-[3rem] text-white space-y-6 shadow-2xl flex flex-col justify-between">
                      <div>
                        <h3 className="text-2xl font-serif font-bold mb-3">{t.reportForm}</h3>
                        <p className="text-rose-200/80 leading-relaxed">
                          Un canal simplificat de sesizare directă pentru depunerea plângerilor administrative și asistență juridică neutră în Caraș-Severin.
                        </p>
                      </div>
                      <button onClick={() => setActiveModal('report')} className="w-full py-4 bg-white text-rose-950 rounded-2xl font-black uppercase text-xs tracking-wider transition-colors hover:bg-rose-100 mt-6">
                        Raportează un Incident (Online)
                      </button>
                    </div>
                  </div>
                </section>

                {/* Submit Story Banner */}
                <section className="bg-amber-100 rounded-[4rem] p-8 sm:p-20 text-center space-y-8 border border-amber-200">
                  <div className="max-w-2xl mx-auto space-y-6">
                    <h2 className="text-4xl font-serif font-bold text-amber-950 italic">{t.submitStory}</h2>
                    <p className="text-lg text-amber-900/80 leading-relaxed font-medium">{t.submitStoryDesc}</p>
                    <div className="pt-4">
                      <button onClick={() => alert('Secțiunea de trimitere povești vă va pune în contact cu echipa de comunicare de la codpentrucomunitate@gmail.com')} className="bg-amber-950 text-white px-12 py-5 rounded-2xl font-bold shadow-2xl hover:bg-black transition-all transform hover:scale-105">
                        Scrie-ne pe Email
                      </button>
                    </div>
                  </div>
                </section>
              </main>

              {/* Footer */}
              <footer className="bg-white border-t border-amber-100 py-16">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="grid md:grid-cols-4 gap-12">
                    <div className="col-span-2 space-y-6">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-amber-600 rounded-lg flex items-center justify-center text-white">
                          <i data-lucide="globe" className="w-5 h-5"></i>
                        </div>
                        <span className="text-xl font-bold text-amber-950">{t.titleRomani}</span>
                      </div>
                      <p className="text-gray-500 max-w-sm text-sm leading-relaxed">{t.footerDesc}</p>
                    </div>
                    <div>
                      <h4 className="font-bold text-amber-950 text-xs uppercase tracking-widest mb-6 border-b border-amber-50 pb-2">Navigare</h4>
                      <ul className="space-y-3 text-xs font-bold text-gray-500">
                        <li><a href="#history" className="hover:text-amber-600 transition-colors uppercase">{t.historyHub}</a></li>
                        <li><a href="#academy" className="hover:text-amber-600 transition-colors uppercase">{t.academy}</a></li>
                        <li><a href="#success" className="hover:text-amber-600 transition-colors uppercase">{t.successCenter}</a></li>
                        <li><a href="#opportunities" className="hover:text-amber-600 transition-colors uppercase">{t.opportunities}</a></li>
                      </ul>
                    </div>
                    <div>
                      <h4 className="font-bold text-amber-950 text-xs uppercase tracking-widest mb-6 border-b border-amber-50 pb-2">Contact</h4>
                      <p className="text-xs text-slate-500 font-semibold mb-2">Asociația Cod pentru Comunitate</p>
                      <p className="text-xs text-slate-400 font-bold">codpentrucomunitate@gmail.com</p>
                    </div>
                  </div>
                  <div className="mt-16 pt-8 border-t border-amber-50 flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-bold text-gray-400 uppercase tracking-widest">
                    <span>© {new Date().getFullYear()} {t.titleRomani}</span>
                    <span>Dezvoltat sub emblema Cod pentru Comunitate</span>
                  </div>
                </div>
              </footer>

              {/* INTERACTIVE DEMO ACCENT MODALS (Active State) */}
              {activeModal && (
                <div className="fixed inset-0 bg-amber-950/40 backdrop-blur-sm z-[999] flex items-center justify-center p-4 animate-in fade-in duration-200" onClick={() => setActiveModal(null)}>
                  <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-2xl overflow-hidden animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                    <div className="p-8 border-b border-amber-50 flex justify-between items-center bg-amber-50/50">
                      <h3 className="text-2xl font-serif font-bold text-amber-950 leading-tight">
                        {modalContent[activeModal] ? modalContent[activeModal][lang === 'rom' || lang === 'de' ? 'ro' : lang].title : t[activeModal] || 'Detalii'}
                      </h3>
                      <button onClick={() => setActiveModal(null)} className="p-2 transition-colors duration-200 text-amber-900 bg-white hover:bg-amber-100 rounded-full shadow-sm">
                        <i data-lucide="x" className="w-5 h-5"></i>
                      </button>
                    </div>
                    <div className="p-8 max-h-[70vh] overflow-y-auto text-gray-600 leading-relaxed scroll-mt-2 custom-scrollbar">
                      {modalContent[activeModal] ? modalContent[activeModal][lang === 'rom' || lang === 'de' ? 'ro' : lang].content : (
                        <p className="italic">Detaliile complete ale secțiunii se încarcă în cadrul ghidului general Săre Roma Khetane.</p>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
